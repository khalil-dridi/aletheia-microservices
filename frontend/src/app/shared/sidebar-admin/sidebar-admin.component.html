<!-- ============================================
     ALETHEIA ADMIN SIDEBAR
     Same design system as user sidebar.
     Hover-expand animation (CSS-only).
     ============================================ -->
<aside class="admin-sidebar" aria-label="Admin menu">
  <!-- 1. Admin profile (top section) -->
  <header class="admin-sidebar__header">
    <div class="admin-sidebar__user">
      <div class="admin-sidebar__avatar-wrap">
        <img
          src="https://i.pravatar.cc/150?u=admin"
          alt="Admin avatar"
          class="admin-sidebar__avatar"
          role="img"
        />
        <span class="admin-sidebar__status" role="status" aria-label="Online"></span>
      </div>
      <div class="admin-sidebar__user-details">
        <h2 class="admin-sidebar__user-name">Admin User</h2>
        <span class="admin-sidebar__user-role">Administrator</span>
      </div>
    </div>
  </header>

  <!-- 2. Navigation -->
  <nav class="admin-sidebar__nav" role="navigation">
    <ul class="admin-sidebar__nav-list">
      <li class="admin-sidebar__nav-item">
        <a href="#" class="admin-sidebar__nav-link admin-sidebar__nav-link--active" aria-current="page">
          <svg class="admin-sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>
          </svg>
          <span class="admin-sidebar__nav-label">Dashboard</span>
        </a>
      </li>
      <li class="admin-sidebar__nav-item" >
        <a routerLink="/admin/list-user" class="admin-sidebar__nav-link">
          <svg class="admin-sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span class="admin-sidebar__nav-label" >Manage Users</span>
        </a>
      </li>
      <li class="admin-sidebar__nav-item">
        <a href="#" class="admin-sidebar__nav-link">
          <svg class="admin-sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
          <span class="admin-sidebar__nav-label">Manage Courses</span>
        </a>
      </li>
      <li class="admin-sidebar__nav-item">
        <a href="#" class="admin-sidebar__nav-link" routerLink="/admin/request-list">
          <svg class="admin-sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span class="admin-sidebar__nav-label">Instructor Requests</span>
        </a>
      </li>
      <li class="admin-sidebar__nav-item">
        <a href="#" class="admin-sidebar__nav-link">
          <svg class="admin-sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span class="admin-sidebar__nav-label">Reports</span>
        </a>
      </li>
      <li class="admin-sidebar__nav-item">
        <a href="#" class="admin-sidebar__nav-link">
          <svg class="admin-sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span class="admin-sidebar__nav-label">Platform Settings</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- 3. Footer – Logout (danger style) -->
  <footer class="admin-sidebar__footer">
    <button (click)="logout()" type="button" class="admin-sidebar__btn-logout" aria-label="Logout">
      <svg class="admin-sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="admin-sidebar__btn-text">Logout</span>
    </button>
  </footer>
</aside>
