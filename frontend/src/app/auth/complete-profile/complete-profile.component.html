<!-- ============================================
     ALETHEIA COMPLETE PROFILE / AVATAR STEP
     Static visual design only (no logic).
     ============================================ -->

<!-- Outer full-page container with gradient background -->
<section
  class="profile-page"
  [class.dark-theme]="themeService.isDark$ | async"
>
  <!-- Centered card for profile picture update -->
  <div class="profile-card" aria-label="Complete profile - update profile picture">
    <!-- Card header -->
    <header class="profile-card-header">
      <div class="profile-logo">ALETHEIA</div>
      <h1 class="profile-title">Complete your profile</h1>
      <p class="profile-subtitle">
        Add a profile picture so your classmates and instructors can recognize you.
      </p>
    </header>

    <!-- Profile picture upload area -->
    <div class="profile-avatar-section">
      <!-- Hidden file input (visual only, no logic attached) -->
      <input
        type="file"
        id="profile-upload"
        class="profile-file-input"
        accept="image/*"
      />

      <!-- Circular avatar placeholder acting as the visual trigger -->
      <label for="profile-upload" class="avatar-wrapper">
        <div class="avatar-circle">
          <span class="avatar-initials" aria-hidden="true">A</span>
          <span class="avatar-ring"></span>
          <span class="avatar-glow"></span>

          <!-- Camera icon overlay (pure SVG, decorative) -->
          <span class="avatar-camera" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M7 7L8.5 5H15.5L17 7H19C20.1046 7 21 7.89543 21 9V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V9C3 7.89543 3.89543 7 5 7H7Z"
              />
              <circle cx="12" cy="13" r="3.25" />
            </svg>
          </span>
        </div>
      </label>

      <!-- Helper text under avatar -->
      <p class="avatar-helper-text">
        Click to update profile picture
      </p>
    </div>

    <!-- Action buttons: Next + Ignore -->
    <div class="profile-actions" aria-label="Profile picture actions">
      <button type="button" class="btn-next">
        Next
      </button>
      <button type="button" class="btn-ignore">
        Ignore
      </button>
    </div>
  </div>
</section>

<!-- Accessibility helper text for screen readers -->
<span class="sr-only" aria-live="polite">
  ALETHEIA complete profile page. Static template for updating profile picture.
</span>
